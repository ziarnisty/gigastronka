<script>

function fireConfetti() {
    confetti({
        particleCount: 100, // Ilość "konfetti"
        spread: 70,         // Rozrzut
        origin: { y: 0.6 } // Skąd mają wylatywać (trochę wyżej niż środek)
    });

    // Możesz dodać drugi, mniejszy "wybuch" po chwili
    setTimeout(() => {
        confetti({
            particleCount: 50,
            spread: 50,
            origin: { y: 0.8, x: 0.2 }, // Z innej pozycji
            colors: ['#007bff', '#28a745', '#dc3545', '#ffc107'] // Kolory konfetti
        });
    }, 250); // Po 0.25 sekundy

    setTimeout(() => {
        confetti({
            particleCount: 50,
            spread: 50,
            origin: { y: 0.8, x: 0.8 }, // Z innej pozycji
            colors: ['#007bff', '#28a745', '#dc3545', '#ffc107'] // Kolory konfetti
        });
    }, 350); // Po 0.35 sekundy
}


</script>





<script>
function copyToClipboard(text) {
    const el = event.target; // Łapiemy kliknięty link
    const originalText = el.innerText; // Zapamiętujemy np. "Instagram"

    navigator.clipboard.writeText(text).then(() => {
        el.innerText = "Skopiowano!"; // Zmieniamy napis
        el.style.color = "#f0abfc";   // Zmieniamy kolor na różowy
        
        setTimeout(() => {
            el.innerText = originalText; // Po 2 sekundach wraca do normy
            el.style.color = ""; 
        }, 2000);
    });
}
</script>

<script>
const secretPin = "4207"; 
const pinInputs = document.querySelectorAll('.pin-digit');
const gameContainer = document.getElementById('game-container'); // Upewnij się, że masz takie ID w HTML
let attempts = 0; 

// 1. Funkcje przeskakiwania
function focusNext(currentIndex) {
    let next = (currentIndex + 1) % pinInputs.length;
    let start = next;
    while (pinInputs[next].disabled) {
        next = (next + 1) % pinInputs.length;
        if (next === start) return;
    }
    pinInputs[next].focus();
}

function focusPrev(currentIndex) {
    let prev = (currentIndex - 1 + pinInputs.length) % pinInputs.length;
    let start = prev;
    while (pinInputs[prev].disabled) {
        prev = (prev - 1 + pinInputs.length) % pinInputs.length;
        if (prev === start) return;
    }
    pinInputs[prev].focus();
}

// Funkcja efektu Shake
function triggerShake() {
    gameContainer.classList.add('shake');
    setTimeout(() => {
        gameContainer.classList.remove('shake');
    }, 400); // Czas trwania animacji CSS
}

// 2. Główna logika sprawdzania PIN
function checkPin() {
    let guess = Array.from(pinInputs).map(i => i.value);
    let secret = secretPin.split('');
    let hintElement = document.getElementById('pin-hint');
    let attemptElement = document.getElementById('attempt-count');
    
    // Jeśli nie wszystkie pola są wypełnione, nie sprawdzaj
    if (guess.join('').length < 4) {
        return; 
    }

    attempts++;
    attemptElement.innerText = attempts;

    let result = Array(4).fill(null); 
    let secretUsed = Array(4).fill(false);
    let guessUsed = Array(4).fill(false);

    // Zielone (pozycja i cyfra ok)
    guess.forEach((digit, i) => {
        if (digit === secret[i]) {
            result[i] = 'correct';
            secretUsed[i] = true;
            guessUsed[i] = true;
        }
    });

    // Żółte (cyfra jest, ale w złym miejscu)
    guess.forEach((digit, i) => {
        if (!guessUsed[i]) {
            let foundIndex = secret.findIndex((sDigit, sIdx) => 
                sDigit === digit && !secretUsed[sIdx]
            );
            if (foundIndex !== -1) {
                result[i] = 'present';
                secretUsed[foundIndex] = true;
                guessUsed[i] = true;
            } else {
                result[i] = 'wrong';
            }
        }
    });

    // Aplikacja kolorów
    pinInputs.forEach((input, i) => {
        if (!input.disabled) {
            input.classList.remove('correct', 'present', 'wrong');
            if (result[i] === 'correct') {
                input.classList.add('correct');
                input.disabled = true;
                input.style.cursor = "not-allowed";
            } else if (result[i] === 'present') {
                input.classList.add('present');
            } else if (result[i] === 'wrong') {
                input.classList.add('wrong');
            }
        }
    });

    const guessNum = guess.join('');
    
    if (guessNum !== secretPin) {
        triggerShake(); // Efekt potrząsania przy błędzie
        
        // Czyścimy tylko te pola, które NIE są "correct" (zielone)
        pinInputs.forEach(input => {
            if (!input.disabled) input.value = "";
        });

        // Fokus na pierwsze wolne pole
        const firstFree = Array.from(pinInputs).find(input => !input.disabled);
        if (firstFree) firstFree.focus();
    }

    // Podpowiedzi góra/dół
    const guessInt = parseInt(guessNum);
    const secretInt = parseInt(secretPin);
    if (guessInt < secretInt) {
        hintElement.innerText = "Za mało! ↑";
    } else if (guessInt > secretInt) {
        hintElement.innerText = "Za dużo! ↓";
    } else {
        hintElement.innerText = `BRAWO! Odgadnięto w ${attempts} próbie! 🎉`;
        fireConfetti(); // Twoja funkcja konfetti
    }
}

// 3. Obsługa zdarzeń
pinInputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
        
        if (e.target.value.length === 1) {
            // Sprawdzamy, czy to było ostatnie wolne pole
            const remainingInputs = Array.from(pinInputs).filter(i => !i.disabled && i.value === "");
            
            if (remainingInputs.length === 0) {
                checkPin(); // Automatyczne sprawdzenie, gdy wszystkie pola są pełne
            } else {
                focusNext(index);
            }
        }
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
            if (input.value.length === 0) {
                focusPrev(index);
                e.preventDefault();
            }
        } else if (e.key === 'ArrowLeft') {
            focusPrev(index);
            e.preventDefault();
        } else if (e.key === 'ArrowRight') {
            focusNext(index);
            e.preventDefault();
        } else if (e.key === 'Enter') {
            checkPin();
        }
    });
});
</script>
