<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="kalkulator.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Kalkulator</title>
</head>
<body>

<nav class="navbar-glow">
    <div class="nav-content">
        <ul class="nav-links" id="nav-menu">
            <li><a href="index.html">Główna</a></li>
            <li><a href="kalkulator.html" class="active">Kalkulator</a></li>
            <li><a href="#projects">Projekty</a></li>
            <li><a href="#contact">Kontakt</a></li>
            <li class="push-right"><a href="logowanie.html">Logowanie</a></li>
            <li><a href="#rejestracja">Rejestracja</a></li>
        </ul>
    </div>
</nav>

<div class="main-container">
    <div class="bajer calc-wrapper">
        <h2>Kalkulator Handlu Skinami</h2>
        <p3>Wybierz odpowiedni przelicznik</p3>
        
        <!-- PANEL USTALANIA KURSU - NOWY FORMAT -->
        <div class="market-rate-panel">
            <div class="rate-input-row">
                <span class="rate-label">1 🪙 =</span>
                <input type="number" id="base-rate" step="0.01" value="0.65" oninput="updateRate()">
                <span class="rate-label">$</span>
            </div>
            
        </div>
        <div>
            <button onclick="resetCalc()" class="reset-btn" title="Resetuj dane">↺</button>
        </div>
        

        <div class="calc-mode-selector">
            <button id="btn-to-roll" class="mode-btn active" onclick="setMode('to-roll')">
                Kupno Float ➔ Roll<br>($ ➔ 🪙)
            </button>
            <button id="btn-from-roll" class="mode-btn" onclick="setMode('from-roll')">
                Kupno Roll ➔ Float<br>(🪙 ➔ $)    
            </button>
        </div>

        <div class="calc-inputs-container">
            <div class="calc-field">
                <label id="label-float">Cena CSFloat ($)</label>
                <input type="number" id="inp-float" class="calc-input" placeholder="0.00" oninput="runCalc()">
            </div>
            <div class="calc-field">
                <label id="label-roll">Cena Roll (Pkt)</label>
                <input type="number" id="inp-roll" class="calc-input" placeholder="0.00" oninput="runCalc()">
            </div>
        </div>

        <div id="res-box" class="result-area">
            <div id="res-content">
                <span style="opacity: 0.5;">Wpisz dane powyżej...</span>
            </div>
            
            <div id="progress-wrap" style="display: none; width: 100%; max-width: 200px; margin: 15px auto 0 auto;">
                <div style="display: flex; justify-content: space-between; font-size: 13px; color: #ffffff; margin-bottom: 5px; font-weight: 800; font-family: 'Montserrat', sans-serif;">
                    <span>-25%</span>
                    <span>0%</span>
                    <span>+25%</span>
                </div>
                <div style="width: 100%; height: 10px; background: rgba(255,255,255,0.15); border-radius: 5px; position: relative; overflow: hidden;">
                    <div id="calc-progress" style="height: 100%; width: 0%; position: absolute; left: 50%; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);"></div>
                    <div style="position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: rgba(255,255,255,0.7); z-index: 2;"></div>
                </div>
            </div>
        </div>

        <div class="calc-footer">
            <span class="sub-text" id="fee-info">(szukaj poniżej < 0.67)</span>
            <span class="sub-fee" id="tax-info">Uwzględnia opłatę 2% na csfloat!</span>
        </div>
    </div>
</div>

<footer class="stopka">
    <p>&copy; 2026 Karol Moskalewicz | Trader Tool</p>
</footer>

<script>
    let mode = 'to-roll';

    window.addEventListener('load', () => {
        const savedRate = localStorage.getItem('user_market_base');
        if (savedRate) {
            document.getElementById('base-rate').value = savedRate;
        }
        runCalc();
    });

    function updateRate() {
        const newRate = document.getElementById('base-rate').value;
        if (newRate && newRate > 0) {
            localStorage.setItem('user_market_base', newRate);
            runCalc();
        }
    }

    function setMode(m) {
        mode = m;
        const feeInfo = document.getElementById('fee-info');
        const taxInfo = document.getElementById('tax-info');
        if (m === 'to-roll') {
            feeInfo.innerText = "(szukaj poniżej < 0.67)";
            taxInfo.style.opacity = "0.5";
        } else {
            feeInfo.innerText = "(szukaj powyżej > 0.7)";
            taxInfo.style.opacity = "1";
        }
        document.getElementById('btn-to-roll').classList.toggle('active', m === 'to-roll');
        document.getElementById('btn-from-roll').classList.toggle('active', m === 'from-roll');
        runCalc();
    }

    function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const tooltip = btn.nextElementSibling;
            tooltip.classList.add('show');
            setTimeout(() => { tooltip.classList.remove('show'); }, 1200);
        });
    }

    function runCalc() {
        const f = parseFloat(document.getElementById('inp-float').value);
        const r = parseFloat(document.getElementById('inp-roll').value);
        const MARKET_BASE = parseFloat(document.getElementById('base-rate').value) || 0.65;

        const box = document.getElementById('res-box');
        const content = document.getElementById('res-content');
        const progWrap = document.getElementById('progress-wrap');
        const progBar = document.getElementById('calc-progress');

        if (!f || !r || isNaN(f) || isNaN(r)) {
            content.innerHTML = '<span style="opacity: 0.5;">Wpisz dane powyżej...</span>';
            box.className = "result-area";
            progWrap.style.display = "none";
            return;
        }

        let ratio, label, css, percent;
        if (mode === 'to-roll') {
            ratio = f / r;
            percent = ((MARKET_BASE - ratio) / MARKET_BASE) * 100;
            if (ratio <= (MARKET_BASE * 0.94)) { label = "ŚWIETNA WPŁATA"; css = "res-best"; }
            else if (ratio <= (MARKET_BASE * 1.01)) { label = "DOBRA WPŁATA"; css = "res-good"; }
            else if (ratio <= (MARKET_BASE * 1.04)) { label = "NEUTRALNIE"; css = "res-neutral"; }
            else { label = "STRATA (DROGO)"; css = "res-bad"; }
        } else {
            const cleanMoney = f * 0.98; 
            ratio = cleanMoney / r;
            percent = ((ratio - MARKET_BASE) / MARKET_BASE) * 100;
            if (ratio >= (MARKET_BASE * 1.10)) { label = "POTĘŻNA WYPŁATA"; css = "res-best"; }
            else if (ratio >= (MARKET_BASE * 1.05)) { label = "ZYSKOWNA WYPŁATA"; css = "res-good"; }
            else if (ratio >= (MARKET_BASE * 0.98)) { label = "WYJŚCIE NA ZERO"; css = "res-neutral"; }
            else { label = "STRATA NA WYPŁACIE"; css = "res-bad"; }
        }

        progWrap.style.display = "block";
        let clamped = Math.max(-25, Math.min(25, percent));
        if (clamped >= 0) {
            progBar.style.width = (clamped * 2) + "%"; 
            progBar.style.left = "50%";
            progBar.style.background = "#4ade80";
            progBar.style.boxShadow = "0 0 10px #4ade80";
        } else {
            let w = Math.abs(clamped) * 2;
            progBar.style.width = w + "%";
            progBar.style.left = (50 - w) + "%";
            progBar.style.background = "#f87171";
            progBar.style.boxShadow = "0 0 10px #f87171";
        }

        box.className = `result-area ${css}`;
        const color = percent >= 0 ? "#4ade80" : "#f87171";
        const sign = percent >= 0 ? "+" : "";

        content.innerHTML = `
            <div class="ratio-label" style="font-weight: bold; margin-bottom: 5px;">${label}</div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                <div class="ratio-number" style="font-size: 2.8rem; font-weight: 900;">${ratio.toFixed(3)}</div>
                
                <div class="copy-container">
                    <button class="copy-icon-btn" onclick="copyToClipboard('${ratio.toFixed(3)}', this)">📋</button>
                    <div class="copy-tooltip">SKOPIOWANO!</div>
                </div>
            </div>
            <div class="percent-badge" style="color: ${color}; font-weight: 900; font-size: 1.4rem; margin-top: 5px;">
                ${sign}${percent.toFixed(1)}% <span class="vs-text" style="font-size: 0.9rem; font-weight: normal; opacity: 0.7;">vs ${MARKET_BASE}</span>
            </div>
        `;
    }


    function resetCalc() {
    document.getElementById('inp-float').value = '';
    document.getElementById('inp-roll').value = '';
    runCalc(); // Odświeży widok wyniku na "Czekam na ceny..."
}
</script>
</body>
</html>
