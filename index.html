<script>
function copyToClipboard(text) {
    const el = event.target; // Łapiemy kliknięty link
    const originalText = el.innerText; // Zapamiętujemy np. "Instagram"

    navigator.clipboard.writeText(text).then(() => {
        el.innerText = "Skopiowano!"; // Zmieniamy napis
        el.style.color = "#f0abfc";   // Zmieniamy kolor na różowy
        
        setTimeout(() => {
            el.innerText = originalText; // Po 2 sekundach wraca do normy
            el.style.color = ""; 
        }, 2000);
    });
}
</script>

<script>
// Pobieramy wszystkie linki z menu
const links = document.querySelectorAll('.nav-links a');

links.forEach(link => {
    link.addEventListener('click', function() {
        // 1. Usuwamy klasę 'active' ze wszystkich linków
        links.forEach(l => l.classList.remove('active'));
        
        // 2. Dodajemy klasę 'active' do tego, który właśnie kliknęliśmy
        this.classList.add('active');
    });
});
</script>





<script>
const navbar = document.querySelector('.navbar-glow');

navbar.addEventListener('mousemove', (e) => {
    const rect = navbar.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // Łączymy dwa gradienty: 
    // 1. Ruchome światełko (radial-gradient)
    // 2. Stałe tło liniowe (linear-gradient)
    navbar.style.backgroundImage = `
        radial-gradient(circle at ${x}px ${y}px, rgba(255, 255, 255, 0.05), transparent 120px),
        linear-gradient(90deg, rgba(0, 22, 72, 0.55), rgba(0, 45, 84, 0.55))
    `;
});

navbar.addEventListener('mouseleave', () => {
    // Przywracamy tylko stały gradient liniowy, gdy myszka ucieknie
    navbar.style.backgroundImage = `linear-gradient(90deg, rgba(0, 22, 72, 0.55), rgba(0, 45, 84, 0.55))`;
});
    </script>
