<script>
function copyToClipboard(text) {
    const el = event.target;
    const originalText = el.innerText; 

    navigator.clipboard.writeText(text).then(() => {
        el.innerText = "Skopiowano!"; 
        el.style.color = "#f0abfc";  
        
        setTimeout(() => {
            el.innerText = originalText; 
            el.style.color = ""; 
        }, 2000);
    });
}
</script>







<script>
const navbar = document.querySelector('.navbar-glow');

navbar.addEventListener('mousemove', (e) => {
    const rect = navbar.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // Łączymy dwa gradienty: 
    // 1. Ruchome światełko (radial-gradient)
    // 2. Stałe tło liniowe (linear-gradient)
    navbar.style.backgroundImage = `
        radial-gradient(circle at ${x}px ${y}px, rgba(255, 255, 255, 0.05), transparent 120px),
        linear-gradient(90deg, rgba(0, 22, 72, 0.55), rgba(0, 45, 84, 0.55))
    `;
});

navbar.addEventListener('mouseleave', () => {
    // Przywracamy tylko stały gradient liniowy, gdy myszka ucieknie
    navbar.style.backgroundImage = `linear-gradient(90deg, rgba(0, 22, 72, 0.55), rgba(0, 45, 84, 0.55))`;
});

</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAoV8SUTRpcBMeFDyH86k3lkiKyDOzSfHw",
    authDomain: "giga-stronka.firebaseapp.com",
    projectId: "giga-stronka",
    storageBucket: "giga-stronka.firebasestorage.app",
    messagingSenderId: "53278121002",
    appId: "1:53278121002:web:ee445fd3c60a9b97f03753",
    measurementId: "G-6ZDX603H8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // --- NASZA NOWA FUNKCJA POWIADOMIEŃ ---
  function showNotification(message, isSuccess = false) {
      const alertBox = document.getElementById('custom-alert');
      alertBox.innerText = message;
      
      // Jeśli sukces, dodaj zieloną klasę, w przeciwnym razie usuń ją (czerwona)
      if(isSuccess) {
          alertBox.classList.add('success');
      } else {
          alertBox.classList.remove('success');
      }

      // Pokaż powiadomienie
      alertBox.classList.add('show');

      // Schowaj automatycznie po 3.5 sekundy
      setTimeout(() => {
          alertBox.classList.remove('show');
      }, 4500);
  }
  // ----------------------------------------

  document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault(); 

      const email = document.getElementById('email').value;
      const pass1 = document.getElementById('password').value;
      const pass2 = document.getElementById('password_confirm').value;

      // ZAMIAST ALERT() UŻYWAMY NASZEJ FUNKCJI!
      if (pass1 !== pass2) {
          showNotification("Hasła nie są identyczne! Spróbuj ponownie.");
          return;
      }

      if (pass1.length < 6) {
          showNotification("Hasło musi mieć co najmniej 6 znaków!");
          return;
      }

      createUserWithEmailAndPassword(auth, email, pass1)
          .then((userCredential) => {
              sendEmailVerification(userCredential.user)
                .then(() => {
                    // Wywołujemy powiadomienie na zielono (isSuccess = true)
                    showNotification("Sukces! Sprawdź maila (i SPAM), aby aktywować konto.", true);
                    
                    // Czekamy 3 sekundy, żeby użytkownik przeczytał, i dopiero zmieniamy stronę
                    setTimeout(() => {
                        window.location.href = "logowanie.html"; 
                    }, 4500);
                });
          })
          .catch((error) => {
              if (error.code === 'auth/email-already-in-use') {
                  showNotification("Ten e-mail jest już zarejestrowany!");
              } else if (error.code === 'auth/invalid-email') {
                  showNotification("Podano nieprawidłowy format adresu e-mail.");
              } else {
                  showNotification("Wystąpił błąd: " + error.message);
              }
          });
  });
</script>

<div id="custom-alert" class="custom-alert">Tu pojawi się błąd</div>
