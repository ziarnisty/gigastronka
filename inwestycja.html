<script>
const navbar = document.querySelector('.navbar-glow');

navbar.addEventListener('mousemove', (e) => {
    const rect = navbar.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    navbar.style.backgroundImage = `
        radial-gradient(circle at ${x}px ${y}px, rgba(255, 255, 255, 0.05), transparent 120px),
        linear-gradient(90deg, rgba(0, 22, 72, 0.55), rgba(0, 45, 84, 0.55))
    `;
});

navbar.addEventListener('mouseleave', () => {
    navbar.style.backgroundImage = `linear-gradient(90deg, rgba(0, 22, 72, 0.55), rgba(0, 45, 84, 0.55))`;
});

// ROZWIĄZANIE: Efekt ruchomego podświetlenia dla szklanego boxu menu
const investMenu = document.querySelector('.investment-menu');

investMenu.addEventListener('mousemove', (e) => {
    const rect = investMenu.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    investMenu.style.backgroundImage = `
        radial-gradient(circle at ${x}px ${y}px, rgba(255, 255, 255, 0.05), transparent 120px),
        linear-gradient(90deg, rgba(0, 22, 72, 0.55), rgba(0, 45, 84, 0.55))
    `;
});

investMenu.addEventListener('mouseleave', () => {
    investMenu.style.backgroundImage = `linear-gradient(90deg, rgba(0, 22, 72, 0.55), rgba(0, 45, 84, 0.55))`;
});
</script>
